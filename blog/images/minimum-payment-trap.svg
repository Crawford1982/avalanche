<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="380" height="140" aria-hidden="true">
  <title>Minimum payments keep you in debt longer; extra payments shorten the timeline</title>
  <rect width="380" height="140" fill="transparent"/>
  <!-- Long path: minimum only -->
  <path d="M30 70 Q100 20 180 50 T330 70 L360 70" stroke="#6b7490" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
  <text x="195" y="35" fill="#6b7490" font-family="system-ui,sans-serif" font-size="10">Minimum only = years</text>
  <!-- Short path: extra payment -->
  <path d="M30 110 L150 110 L270 110 L360 110" stroke="#3ecf8e" stroke-width="3" fill="none"/>
  <text x="195" y="102" fill="#3ecf8e" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Extra payment = debt-free sooner</text>
  <!-- Start / end -->
  <circle cx="30" cy="90" r="6" fill="#252a38"/>
  <text x="30" y="128" fill="#6b7490" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Start</text>
  <circle cx="360" cy="90" r="6" fill="#252a38"/>
  <text x="360" y="128" fill="#6b7490" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Debt-free</text>
</svg>
