<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120" aria-hidden="true">
  <title>Paying off three debts: avalanche order targets highest interest first</title>
  <rect width="360" height="120" fill="transparent"/>
  <!-- Three debt blocks (before ’ after) -->
  <g>
    <rect x="20" y="20" width="100" height="28" rx="4" fill="#1a1e28" stroke="#252a38"/>
    <text x="70" y="38" fill="#6b7490" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Debt 1</text>
    <rect x="130" y="20" width="100" height="28" rx="4" fill="#1a1e28" stroke="#252a38"/>
    <text x="180" y="38" fill="#6b7490" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Debt 2</text>
    <rect x="240" y="20" width="100" height="28" rx="4" fill="#1a1e28" stroke="#252a38"/>
    <text x="290" y="38" fill="#6b7490" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Debt 3</text>
  </g>
  <!-- Arrow: payoff order -->
  <path d="M70 70 L180 70 L290 70" stroke="#4f7cff" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="285 66 295 70 285 74" fill="#4f7cff"/>
  <text x="180" y="92" fill="#6b7490" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Payoff order (avalanche: highest APR first)</text>
  <!-- Shrinking = paid off -->
  <rect x="20" y="100" width="40" height="12" rx="2" fill="#3ecf8e"/>
  <text x="40" y="109" fill="#0c0e12" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Done</text>
</svg>
